name: CI/CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"

jobs:
  changelog:
    name: Changelog gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require changelog for code changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | sort -u)"
          if [ -z "${changed}" ]; then
            echo "No changed files detected; skipping changelog requirement."
            exit 0
          fi
          needs_changelog=false
          while IFS= read -r f; do
            [ -z "${f}" ] && continue
            if [ "${f}" = "CHANGELOG.md" ]; then
              continue
            fi
            if [ "${f}" = "README.md" ]; then
              continue
            fi
            case "${f}" in
              docs/*) continue ;;
            esac
            if [[ "${f}" == *.md ]] && [ "${f}" != "CHANGELOG.md" ]; then
              continue
            fi
            needs_changelog=true
            break
          done <<< "${changed}"

          if [ "${needs_changelog}" = false ]; then
            echo "Only documentation-style files changed; changelog not required."
            exit 0
          fi

          if echo "${changed}" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated alongside code/config changes. OK."
            exit 0
          fi

          echo "::error::Code or config files changed but CHANGELOG.md was not updated. Add a brief entry under the appropriate date in CHANGELOG.md."
          exit 1

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Pytest
        run: uv run pytest -v


  deploy:
    name: Build & deploy to Cloud Run
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: deploy-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: docqflow
      GCP_REGION: us-central1
      AR_HOST: us-central1-docker.pkg.dev
      AR_REPO: docqflow
      IMAGE_NAME: docqflow
      CLOUD_RUN_SERVICE: docqflow-api-dev
      PREFLIGHT_TAG: preflight
      MODEL_BUCKET: docqflow-models
      MODEL_OBJECT: model/model.joblib
      MODEL_LOCAL_PATH: models/model.joblib
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch classifier model from GCS
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${MODEL_LOCAL_PATH}")"
          gcloud storage cp \
            "gs://${MODEL_BUCKET}/${MODEL_OBJECT}" \
            "${MODEL_LOCAL_PATH}"
          ls -l "${MODEL_LOCAL_PATH}"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${AR_HOST}" --quiet

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            us-central1-docker.pkg.dev/docqflow/docqflow/docqflow:latest
            us-central1-docker.pkg.dev/docqflow/docqflow/docqflow:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy new revision (no traffic, tagged for smoke test)
        run: |
          gcloud run services update "${CLOUD_RUN_SERVICE}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --image="${AR_HOST}/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}" \
            --no-traffic \
            --tag="${PREFLIGHT_TAG}" \
            --quiet

      - name: Smoke test new revision via preflight tag
        run: |
          set -euo pipefail
          PREFLIGHT_URL="$(gcloud run services describe "${CLOUD_RUN_SERVICE}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --format=json \
            | jq -r --arg tag "${PREFLIGHT_TAG}" \
                '.status.traffic[] | select(.tag == $tag) | .url')"
          if [ -z "${PREFLIGHT_URL}" ] || [ "${PREFLIGHT_URL}" = "null" ]; then
            echo "::error::Could not resolve preflight URL for tag '${PREFLIGHT_TAG}'. Aborting."
            exit 1
          fi
          echo "Probing ${PREFLIGHT_URL}/api/health for up to 60s (new revision is not yet serving production traffic)..."
          for i in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "${PREFLIGHT_URL}/api/health" || echo '000')"
            if [ "${code}" = "200" ]; then
              echo "Health check passed on attempt ${i} (HTTP 200)"
              exit 0
            fi
            echo "Attempt ${i}/30: got HTTP ${code}, sleeping 2s..."
            sleep 2
          done
          echo "::error::Health check failed after 30 attempts (~60s). New revision is held at 0% traffic; the previously serving revision is unaffected."
          exit 1

      - name: Promote new revision to 100% traffic
        run: |
          gcloud run services update-traffic "${CLOUD_RUN_SERVICE}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --to-latest \
            --quiet
