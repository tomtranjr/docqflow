name: CI/CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"

jobs:
  changelog:
    name: Changelog gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require changelog for code changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | sort -u)"
          if [ -z "${changed}" ]; then
            echo "No changed files detected; skipping changelog requirement."
            exit 0
          fi
          needs_changelog=false
          while IFS= read -r f; do
            [ -z "${f}" ] && continue
            if [ "${f}" = "CHANGELOG.md" ]; then
              continue
            fi
            if [ "${f}" = "README.md" ]; then
              continue
            fi
            case "${f}" in
              docs/*) continue ;;
            esac
            if [[ "${f}" == *.md ]] && [ "${f}" != "CHANGELOG.md" ]; then
              continue
            fi
            needs_changelog=true
            break
          done <<< "${changed}"

          if [ "${needs_changelog}" = false ]; then
            echo "Only documentation-style files changed; changelog not required."
            exit 0
          fi

          if echo "${changed}" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated alongside code/config changes. OK."
            exit 0
          fi

          echo "::error::Code or config files changed but CHANGELOG.md was not updated. Add a brief entry under the appropriate date in CHANGELOG.md."
          exit 1

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Pytest
        run: uv run pytest -v


